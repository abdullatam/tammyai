<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tammy · Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/static/admin/styles.css" />

  <!-- Apply persisted theme before paint -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('tammy_admin_palette') || 'purple';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    /* ── Login page styles ─────────────────────────────────────────────── */
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }
    .login-wrapper::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(148,125,237,0.15) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: login-glow 6s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes login-glow {
      0% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    }
    .login-card {
      position: relative;
      z-index: 1;
      width: 380px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 48px 40px 40px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4), 0 0 60px rgba(148,125,237,0.08);
      animation: login-enter 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes login-enter {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .login-orb {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #947DED 0%, #6C5CE7 50%, #4A3ABA 100%);
      margin: 0 auto 28px;
      position: relative;
      box-shadow: 0 8px 32px rgba(108,92,231,0.35);
    }
    .login-orb::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      top: 10px; left: 14px;
      filter: blur(4px);
    }
    .login-title {
      font-family: 'IBM Plex Serif', Georgia, serif;
      font-size: 24px;
      font-weight: 400;
      text-align: center;
      color: var(--ink);
      margin: 0 0 6px;
    }
    .login-sub {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--ink-3);
      text-align: center;
      margin: 0 0 32px;
    }
    .login-field {
      margin-bottom: 16px;
    }
    .login-label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-4);
      margin-bottom: 6px;
    }
    .login-input {
      width: 100%;
      padding: 12px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--ink);
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      outline: none;
      transition: border-color 200ms, box-shadow 200ms;
      box-sizing: border-box;
    }
    .login-input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(148,125,237,0.15);
    }
    .login-input::placeholder {
      color: var(--ink-4);
    }
    .login-btn {
      width: 100%;
      padding: 14px 0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #FFF;
      background: linear-gradient(135deg, #947DED, #6C5CE7);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 200ms;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }
    .login-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(108,92,231,0.35);
    }
    .login-btn:active:not(:disabled) {
      transform: translateY(0);
    }
    .login-btn:disabled {
      opacity: 0.7;
      cursor: wait;
    }
    .login-error {
      margin-top: 16px;
      padding: 10px 14px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 10px;
      font-size: 13px;
      color: var(--danger);
      text-align: center;
      animation: login-shake 0.4s ease;
    }
    @keyframes login-shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: var(--ink-4);
      letter-spacing: 0.04em;
    }
    .login-spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #FFF;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .login-fade-out {
      animation: login-fade 0.3s ease forwards;
    }
    @keyframes login-fade {
      to { opacity: 0; transform: scale(0.98); }
    }
    .dashboard-fade-in {
      animation: dash-in 0.4s ease both;
      animation-delay: 0.15s;
    }
    @keyframes dash-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="/static/admin/data.js"></script>
  <script type="text/babel" src="/static/admin/components.jsx"></script>
  <script type="text/babel" src="/static/admin/pages-1.jsx"></script>
  <script type="text/babel" src="/static/admin/pages-2.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Login Page ────────────────────────────────────────────────────────
    const LoginPage = ({ onLogin }) => {
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [checking, setChecking] = useState(true);
      const inputRef = useRef(null);

      // Auto-login with saved credentials on mount
      useEffect(() => {
        (async () => {
          const ok = await window.AdminAuth.checkSession();
          if (ok) {
            onLogin();
          } else {
            setChecking(false);
            setTimeout(() => inputRef.current?.focus(), 300);
          }
        })();
      }, []);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!password.trim() || loading) return;
        setLoading(true);
        setError('');

        const ok = await window.AdminAuth.login(password.trim());
        if (ok) {
          onLogin();
        } else {
          setError('Invalid password. Please try again.');
          setLoading(false);
          setPassword('');
          setTimeout(() => inputRef.current?.focus(), 100);
        }
      };

      if (checking) {
        return (
          <div className="login-wrapper">
            <div style={{ textAlign: 'center' }}>
              <div className="login-orb" style={{ animation: 'pulse-glow 1.5s ease infinite' }} />
              <div style={{ color: 'var(--ink-3)', fontSize: 13, marginTop: 16 }}>Checking session…</div>
            </div>
          </div>
        );
      }

      return (
        <div className="login-wrapper">
          <div className="login-card">
            <div className="login-orb" />
            <h1 className="login-title">Tammy Admin</h1>
            <p className="login-sub">Enter your admin password to continue</p>

            <form onSubmit={handleSubmit}>
              <div className="login-field">
                <label className="login-label">Password</label>
                <input
                  ref={inputRef}
                  type="password"
                  className="login-input"
                  placeholder="Enter admin password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  disabled={loading}
                  autoComplete="current-password"
                />
              </div>

              <button type="submit" className="login-btn" disabled={loading || !password.trim()}>
                {loading ? (
                  <><span className="login-spinner" /> Authenticating…</>
                ) : (
                  'Sign in'
                )}
              </button>
            </form>

            {error && <div className="login-error">{error}</div>}

            <div className="login-footer">
              Tammy AI · Admin Panel
            </div>
          </div>
        </div>
      );
    };

    // ── Dashboard Pages ───────────────────────────────────────────────────
    const PAGES = {
      overview: window.OverviewPage,
      prompt: window.PromptPage,
      rag: window.RAGPage,
      users: window.UsersPage,
      test: window.TestPage,
      settings: window.SettingsPage,
    };

    const ThemeToggle = ({ value, onChange }) => (
      <div style={{
        position: 'fixed', top: 20, right: 24, zIndex: 200,
        display: 'inline-flex', padding: 3,
        background: 'var(--surface)', border: '1px solid var(--mauve)',
        borderRadius: 999, gap: 2,
        boxShadow: '0 6px 20px rgba(0,0,0,0.25)',
      }}>
        {[
          { k: 'light', l: 'light' },
          { k: 'purple', l: 'purple' },
        ].map(o => (
          <button key={o.k} onClick={() => onChange(o.k)} style={{
            padding: '6px 14px', fontSize: 11,
            fontFamily: 'var(--f-sans)', fontWeight: 500,
            letterSpacing: '0.04em',
            border: 'none', cursor: 'pointer',
            borderRadius: 999,
            background: value === o.k ? 'var(--purple)' : 'transparent',
            color: value === o.k ? '#FFFFFF' : 'var(--ink-2)',
            transition: 'all 160ms ease',
          }}>{o.l}</button>
        ))}
      </div>
    );

    // ── App Root ──────────────────────────────────────────────────────────
    const App = () => {
      const [authed, setAuthed] = useState(false);
      const [booted, setBooted] = useState(false);
      const [page, setPage] = useState('overview');
      const [theme, setTheme] = useState(() => {
        try { return localStorage.getItem('tammy_admin_palette') || 'purple'; }
        catch (e) { return 'purple'; }
      });

      // Listen for forced logout (401)
      useEffect(() => {
        window.AdminAuth._onAuthChange = (val) => {
          if (!val) {
            setAuthed(false);
            setBooted(false);
          }
        };
      }, []);

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        try { localStorage.setItem('tammy_admin_palette', theme); } catch (e) {}
      }, [theme]);

      const handleLogin = useCallback(async () => {
        setAuthed(true);
        // Bootstrap data in the background
        await window.AdminBootstrap();
        setBooted(true);
      }, []);

      // ── Not authenticated → show login
      if (!authed) {
        return <LoginPage onLogin={handleLogin} />;
      }

      // ── Authenticated → show dashboard
      const Page = PAGES[page] || (() => <div style={{ padding: 40 }}>Loading…</div>);
      return (
        <div className={booted ? 'dashboard-fade-in' : ''} data-screen-label={`Admin · ${page}`}>
          <Sidebar active={page} onSelect={setPage} admin={window.AdminData.meta.admin} />
          <ThemeToggle value={theme} onChange={setTheme} />
          <main key={page} style={{ marginLeft: 110, padding: '32px 40px 60px', maxWidth: 1480 }}>
            <Page />
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
